name: MiBoxRemote
options:
  bundleIdPrefix: com.mibox
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.mibox.remote
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)

targets:
  MiBoxRemote:
    type: application
    platform: iOS
    info:
      path: MiBoxRemote/Info.plist
      properties:
        CFBundleName: MiBoxRemote
        CFBundleDisplayName: MiBox Remote
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSLocalNetworkUsageDescription: "Ağdaki Mi Box cihazlarını keşfetmek için yerel ağ erişimi gereklidir."
        NSBonjourServices:
          - "_androidtvremote._tcp"
          - "_androidtvremote2._tcp"
        NSMotionUsageDescription: "Air Mouse özelliği için hareket sensörlerine erişim gereklidir."
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    sources:
      - path: MiBoxRemote
        excludes:
          - "**/*.md"
          - "**/Info.plist"
    resources:
      - MiBoxRemote/Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: MiBoxRemote
        INFOPLIST_FILE: MiBoxRemote/Info.plist
