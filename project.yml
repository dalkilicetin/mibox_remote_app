name: MiBoxRemote
options:
  bundleIdPrefix: com.mibox
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.mibox.remote
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)

targets:
  MiBoxRemote:
    type: application
    platform: iOS
    info:
      path: Info.plist
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: Utilities
      - path: Views
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: MiBoxRemote
