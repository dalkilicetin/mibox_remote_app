name: MiBoxRemote
options:
  bundleIdPrefix: com.mibox
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.mibox.remote
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)

targets:
  MiBoxRemote:
    type: application
    platform: iOS
    info:
      path: Info.plist
      properties:
        UILaunchScreen:
          UIImageName: AppIcon
        NSLocalNetworkUsageDescription: "Ağdaki Mi Box cihazlarını keşfetmek için yerel ağ erişimi gereklidir."
        NSBonjourServices:
          - _androidtvremote._tcp
          - _androidtvremote2._tcp
        NSMotionUsageDescription: "Air Mouse özelliği için hareket sensörlerine erişim gereklidir."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIViewControllerBasedStatusBarAppearance: false
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: Utilities
      - path: Views
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: MiBoxRemote
