name: Build Swift iOS IPA

on:
  push:
    branches: [ main ]
    paths:
      - 'swift_app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: swift_app
        run: xcodegen generate

      - name: Build (no codesign)
        working-directory: swift_app
        run: |
          xcodebuild \
            -project MiBoxRemote.xcodeproj \
            -scheme MiBoxRemote \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build \
            2>&1 | tee ../swift_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== SON 100 SATIR ==="
            tail -100 ../swift_build.log
            exit 1
          fi

      - name: IPA oluştur
        working-directory: swift_app
        run: |
          APP=$(find build -name "MiBoxRemote.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "HATA: .app bulunamadı"
            find build -name "*.app" -type d || true
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r MiBoxRemote.ipa Payload/
          ls -lh MiBoxRemote.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MiBoxRemote-Swift-ipa
          path: swift_app/MiBoxRemote.ipa
          retention-days: 7

      - name: Upload build log (sadece hata)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: swift-build-log
          path: swift_build.log
          retention-days: 3
