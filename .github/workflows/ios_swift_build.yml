name: Build Swift iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      # ── Cache: XcodeGen ────────────────────────────────────────────────
      - name: Cache XcodeGen
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/xcodegen
          key: xcodegen-${{ runner.os }}

      - name: Install XcodeGen
        run: command -v xcodegen || brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # ── Signing: App Store Connect API Key ────────────────────────────
      # .p8 dosyasını runner'ın beklediği konuma yaz
      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}" \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      # ── Signing: Geçici keychain + sertifika ──────────────────────────
      # xcodebuild -allowProvisioningUpdates ile API key üzerinden
      # otomatik provisioning profile indirir ve sertifika oluşturur
      - name: Build & Sign (iphoneos)
        run: |
          set -o pipefail
          xcodebuild \
            -project MiBoxRemote.xcodeproj \
            -scheme MiBoxRemote \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./build \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            build \
            2>&1 | tee swift_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo ""
            echo "=== BUILD HATASI — SON 150 SATIR ==="
            tail -150 swift_build.log
            exit 1
          fi

      # ── IPA oluştur ───────────────────────────────────────────────────
      - name: IPA oluştur
        run: |
          APP=$(find build -name "MiBoxRemote.app" -type d | grep -v "\.app/" | head -1)
          if [ -z "$APP" ]; then
            echo "HATA: MiBoxRemote.app bulunamadı"
            find build -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          echo "Bulunan .app: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r MiBoxRemote.ipa Payload/
          ls -lh MiBoxRemote.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MiBoxRemote-ipa
          path: MiBoxRemote.ipa
          retention-days: 7

      # ── Hata durumunda logları yükle ──────────────────────────────────
      - name: Upload build log (hata)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: swift-build-log
          path: swift_build.log
          retention-days: 3
