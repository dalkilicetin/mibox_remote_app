name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Flutter pub get
        run: flutter pub get

      - name: Xcode code signing kapat (proje dosyasında)
        run: |
          # pbxproj içinde CODE_SIGNING_REQUIRED ve DEVELOPMENT_TEAM'i patch et
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' \
            -e 's/CODE_SIGN_IDENTITY = ".*"/CODE_SIGN_IDENTITY = ""/g' \
            -e 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' \
            -e 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' \
            -e 's/PROVISIONING_PROFILE_SPECIFIER = ".*"/PROVISIONING_PROFILE_SPECIFIER = ""/g' \
            "$PBXPROJ"
          echo "pbxproj patch tamam"

      - name: Build unsigned IPA
        run: |
          # 1. Flutter build
          flutter build ios --release --no-codesign --verbose || { echo "FLUTTER BUILD FAILED"; exit 1; }

          # 2. xcodebuild archive
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -verbose || { echo "XCODEBUILD FAILED"; exit 1; }

          # 3. .app dosyasını paketle
          mkdir -p build/Payload
          cp -r build/ios/Runner.xcarchive/Products/Applications/Runner.app build/Payload/
          cd build && zip -r MiBoxRemote.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MiBoxRemote-ipa
          path: build/MiBoxRemote.ipa
          retention-days: 7
