name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Pub cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: pub-

      - name: CocoaPods cache
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter build iOS
        run: |
          flutter build ios --release --no-codesign 2>&1 | tee flutter_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            tail -150 flutter_build.log
            exit 1
          fi

      - name: IPA oluştur
        run: |
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then echo "HATA: Runner.app bulunamadı"; exit 1; fi
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r MiBoxRemote.ipa Payload/
          ls -lh MiBoxRemote.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MiBoxRemote-ipa
          path: build/MiBoxRemote.ipa
          retention-days: 7

      - name: Upload build log (sadece hata)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-log
          path: flutter_build.log
          retention-days: 3
